# Create Release Ticket Configuration
# You can modify these default values as needed

jira:
  base_url: "https://netskope.atlassian.net"
  project_id: "10011"
  # Issue type IDs
  promote_issue_type_id: "7"
  deployment_issue_type_id: "10940"
  # Component
  component_id: "13002"
  component_name: "Query Service (QS)"
  # User ID: set via JIRA_USER_ID in .env (get from /rest/api/3/myself)
  # Transition IDs
  done_transition_id: "761"

github:
  owner: "netSkope"
  repo: "query-engine"
  workflow_file: "ep-falcon-distribution.yml"
  # Optional: set via GITHUB_NOTIFY_EMAILS in .env (space-separated)
  # Default destinations
  destinations: "commercial:pre-prod commercial:prod"
  manifest_service: "queryservice"

jenkins:
  job_name: "one_button_queryservice"
  # Fixed parameters
  regions: "America"
  pop_types: "MP"
  pops: "devint-automation-iad0-nc1"
  slack_channel: "#queryservice-deployments,#eng-deployments,#deployments"
  stork_component_name: "queryservice"
  run_qe_pdv: "DEPLOY_AND_PDV"
  pdv_config_image_tag: "2.0.143"
  # Polling settings
  poll_interval_seconds: 60
  timeout_minutes: 60
  # How many consecutive poll failures before giving up (handles VPN blips)
  max_consecutive_poll_failures: 5

# Timezone for ticket dates
timezone: "+08:00"

# Retry settings
retry:
  max_attempts: 5
  backoff_seconds: 2
